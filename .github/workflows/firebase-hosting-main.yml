name: Deploy main branch

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm --prefix functions ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyA40Pr5bRA-a58J-5gXFIvfRsaq1Fwsv6o
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: crmcss-30b79.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: crmcss-30b79
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: crmcss-30b79.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "980996796067"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:980996796067:web:917e6c3bfea9e60a359916
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-6VCG1TC50L

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CRMCSS_30B79 }}
          projectId: crmcss-30b79
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyA40Pr5bRA-a58J-5gXFIvfRsaq1Fwsv6o
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: crmcss-30b79.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: crmcss-30b79
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: crmcss-30b79.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "980996796067"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:980996796067:web:917e6c3bfea9e60a359916
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-6VCG1TC50L
