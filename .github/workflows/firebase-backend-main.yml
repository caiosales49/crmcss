name: Deploy Firebase backend

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firestore.indexes.json
      - storage.rules
      - firebase.json
      - functions/**
      - .github/workflows/firebase-backend-main.yml

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm --prefix functions ci
      - run: npm --prefix functions run build

      - uses: w9jds/firebase-action@v13.34.0
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage,functions --project crmcss-30b79 --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CRMCSS_30B79 }}
